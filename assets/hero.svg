<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HRM Workspace Rules hero banner</title>
  <desc id="desc">Dark technical README banner for HRM workspace metadata, agent rules, Roo modes, commands, skills, and reusable workflows.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080B0D"/>
      <stop offset="0.52" stop-color="#11100B"/>
      <stop offset="1" stop-color="#070808"/>
    </linearGradient>

    <linearGradient id="warm" x1="200" y1="140" x2="840" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E62"/>
      <stop offset="1" stop-color="#D9583F"/>
    </linearGradient>

    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 390) rotate(32) scale(520 310)">
      <stop offset="0" stop-color="#F2764F" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F2764F" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <g opacity="0.55">
    <path d="M112 184H510" stroke="#F59E62" stroke-opacity="0.48"/>
    <path d="M112 706H1488" stroke="#F59E62" stroke-opacity="0.18"/>
    <path d="M1102 132H1488" stroke="#F59E62" stroke-opacity="0.35"/>
  </g>

  <g transform="translate(112 110)">
    <rect x="0" y="0" width="1376" height="680" rx="24" fill="#0B0D0E" fill-opacity="0.76" stroke="#FFFFFF" stroke-opacity="0.08" filter="url(#shadow)"/>

    <g transform="translate(38 36)">
      <rect x="0" y="0" width="52" height="52" rx="14" fill="#2A1B14" stroke="#F59E62" stroke-opacity="0.28"/>
      <text x="26" y="33" text-anchor="middle" fill="#F59E62" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="17" font-weight="800">HRM</text>
      <text x="70" y="23" fill="#F4EFE8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="22" font-weight="800">HRM Workspace Rules</text>
      <text x="70" y="48" fill="#8C8A84" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="15">metadata / rules / workflows</text>

      <g transform="translate(1130 2)">
        <rect x="0" y="0" width="174" height="34" rx="17" fill="#171512" stroke="#F59E62" stroke-opacity="0.25"/>
        <circle cx="20" cy="17" r="4" fill="#F59E62"/>
        <text x="36" y="22" fill="#B8A392" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">workspace layer</text>
      </g>
    </g>

    <g transform="translate(72 184)">
      <text x="0" y="0" fill="#8C6454" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" letter-spacing="6">RULES  •  MODES  •  COMMANDS  •  SKILLS</text>

      <text x="0" y="88" fill="#F4EFE8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="66" font-weight="900">The workspace system</text>
      <text x="0" y="164" fill="#F4EFE8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="66" font-weight="900">for <tspan fill="url(#warm)">AI-assisted</tspan></text>
      <text x="0" y="240" fill="url(#warm)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="66" font-weight="900">HRM development.</text>

      <text x="0" y="304" fill="#B9B4AA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="23">Metadata, agent rules, Roo modes, commands, skills,</text>
      <text x="0" y="336" fill="#B9B4AA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="23">and reusable workflows — not the app code itself.</text>

      <g transform="translate(0 386)" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700">
        <rect x="0" y="0" width="112" height="34" rx="8" fill="#211D16" stroke="#F59E62" stroke-opacity="0.24"/>
        <text x="16" y="22" fill="#F1C09D">AGENTS.md</text>

        <rect x="126" y="0" width="102" height="34" rx="8" fill="#211D16" stroke="#F59E62" stroke-opacity="0.24"/>
        <text x="142" y="22" fill="#F1C09D">Roo Code</text>

        <rect x="242" y="0" width="102" height="34" rx="8" fill="#211D16" stroke="#F59E62" stroke-opacity="0.24"/>
        <text x="258" y="22" fill="#F1C09D">Metadata</text>

        <rect x="358" y="0" width="108" height="34" rx="8" fill="#211D16" stroke="#F59E62" stroke-opacity="0.24"/>
        <text x="374" y="22" fill="#F1C09D">Workflow</text>

        <rect x="480" y="0" width="78" height="34" rx="8" fill="#211D16" stroke="#F59E62" stroke-opacity="0.24"/>
        <text x="496" y="22" fill="#F1C09D">Docs</text>
      </g>
    </g>

    <g transform="translate(840 182)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial">
      <g filter="url(#shadow)">
        <rect x="0" y="0" width="220" height="250" rx="16" fill="#1A1813" stroke="#FFFFFF" stroke-opacity="0.08"/>
        <circle cx="20" cy="24" r="4" fill="#F59E62"/>
        <text x="38" y="30" fill="#EDE7DD" font-size="17" font-weight="800">Rules</text>
        <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#B9B4AA">
          <rect x="18" y="58" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="79">AGENTS.md</text>
          <rect x="18" y="102" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="123">.roo/rules</text>
          <rect x="18" y="146" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="167">.rooignore</text>
          <rect x="18" y="190" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="211">agent policy</text>
        </g>
      </g>

      <g transform="translate(246 0)" filter="url(#shadow)">
        <rect x="0" y="0" width="220" height="250" rx="16" fill="#1A1813" stroke="#FFFFFF" stroke-opacity="0.08"/>
        <circle cx="20" cy="24" r="4" fill="#F59E62"/>
        <text x="38" y="30" fill="#EDE7DD" font-size="17" font-weight="800">Workflows</text>
        <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#B9B4AA">
          <rect x="18" y="58" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="79">planning</text>
          <rect x="18" y="102" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="123">verification</text>
          <rect x="18" y="146" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="167">task-flow</text>
          <rect x="18" y="190" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="211">handoff</text>
        </g>
      </g>

      <g transform="translate(0 278)" filter="url(#shadow)">
        <rect x="0" y="0" width="220" height="250" rx="16" fill="#1A1813" stroke="#FFFFFF" stroke-opacity="0.08"/>
        <circle cx="20" cy="24" r="4" fill="#F59E62"/>
        <text x="38" y="30" fill="#EDE7DD" font-size="17" font-weight="800">Skills</text>
        <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#B9B4AA">
          <rect x="18" y="58" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="79">agent-policy</text>
          <rect x="18" y="102" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="123">review</text>
          <rect x="18" y="146" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="167">analysis</text>
          <rect x="18" y="190" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="211">reuse</text>
        </g>
      </g>

      <g transform="translate(246 278)" filter="url(#shadow)">
        <rect x="0" y="0" width="220" height="250" rx="16" fill="#1A1813" stroke="#FFFFFF" stroke-opacity="0.08"/>
        <circle cx="20" cy="24" r="4" fill="#F59E62"/>
        <text x="38" y="30" fill="#EDE7DD" font-size="17" font-weight="800">Modes &amp; Commands</text>
        <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#B9B4AA">
          <rect x="18" y="58" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="79">.roomodes</text>
          <rect x="18" y="102" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="123">.roo/commands</text>
          <rect x="18" y="146" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="167">custom modes</text>
          <rect x="18" y="190" width="184" height="32" rx="6" fill="#242118"/>
          <text x="32" y="211">task shortcuts</text>
        </g>
      </g>
    </g>

    <g transform="translate(72 640)" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
      <text x="0" y="0" fill="#E5D0BC" font-weight="800">1 metadata repo</text>
      <text x="166" y="0" fill="#8C8A84">|</text>
      <text x="188" y="0" fill="#E5D0BC" font-weight="800">2 app repos separated</text>
      <text x="402" y="0" fill="#8C8A84">|</text>
      <text x="424" y="0" fill="#E5D0BC" font-weight="800">AGENTS.md</text>
      <text x="540" y="0" fill="#8C8A84">|</text>
      <text x="562" y="0" fill="#E5D0BC" font-weight="800">Roo Code ready</text>
      <text x="1164" y="0" fill="#8C8A84">HRM_BE  ·  HRM_FE</text>
    </g>
  </g>
</svg>
